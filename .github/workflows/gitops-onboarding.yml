name: GitOps MCP Onboarding

on:
  pull_request:
    paths:
      - "servers/**/*.yml"
      - "servers/**/*.yaml"
      - "scripts/validate-server-manifests.js"
  push:
    branches: ["main"]
    paths:
      - "servers/**/*.yml"
      - "servers/**/*.yaml"
      - "scripts/validate-server-manifests.js"
      - "scripts/submit-server-manifests.js"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: node scripts/validate-server-manifests.js

  submit:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: node scripts/submit-server-manifests.js
        env:
          ADMIN_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
